<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 广告素材生成平台</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--brand-50:#eef2ff;--brand-600:#4f46e5;--brand-700:#4338ca;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-900:#111827;--green-50:#f0fdf4;--green-600:#16a34a;--red-50:#fef2f2;--red-600:#dc2626;--amber-50:#fffbeb;--amber-600:#d97706;--blue-50:#eff6ff;--blue-600:#2563eb;--sidebar-w:240px}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;color:var(--gray-900);background:var(--gray-50)}
    button,input,select,textarea{font:inherit}
    a{color:var(--brand-600);text-decoration:none}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:#fff;border-right:1px solid var(--gray-200);display:flex;flex-direction:column}
    .sidebar-logo{padding:18px 18px 10px;font-size:15px;font-weight:700;color:var(--brand-700)}
    .sidebar-logo span{display:block;font-size:11px;font-weight:400;color:var(--gray-400);margin-top:3px;line-height:1.4}
    .nav{flex:1;padding:6px 10px;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;background:none;border-radius:8px;color:var(--gray-600);cursor:pointer;text-align:left;margin-bottom:1px;font-size:13px}
    .nav-item:hover{background:var(--gray-100);color:var(--gray-900)}
    .nav-item.active{background:var(--brand-50);color:var(--brand-700);font-weight:600}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.75}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;background:#f4f4f5}
    .page{display:none;flex:1;flex-direction:column;min-height:0}
    .page.active{display:flex}
    .page-header{flex-shrink:0;background:#fff;border-bottom:1px solid var(--gray-200)}
    .page-header-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px}
    .page-header h1{font-size:19px;font-weight:600}
    .tabs{display:flex;gap:2px;border-bottom:1px solid var(--gray-200);padding:0 22px;flex-wrap:wrap}
    .tab{position:relative;padding:9px 14px;border:none;background:none;color:var(--gray-500);font-size:13px;font-weight:500;cursor:pointer}
    .tab.active{color:var(--brand-600)}
    .tab.active::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--brand-600)}
    .tab .badge{margin-left:5px;padding:1px 6px;border-radius:999px;background:var(--gray-100);font-size:10px;color:var(--gray-500)}
    .filters{flex-shrink:0;background:#fff;border-bottom:1px solid var(--gray-200);padding:11px 22px}
    .filters-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
    .filters-row+.filters-row{margin-top:10px}
    .filter-field{display:flex;flex-direction:column;gap:3px;min-width:110px}
    .filter-field.flex-1{flex:1;min-width:180px;max-width:260px}
    .filter-field label{font-size:11px;color:var(--gray-500)}
    .filter-field input,.filter-field select{padding:7px 10px;border:1px solid var(--gray-300);border-radius:7px;background:#fff;font-size:12px;width:100%}
    .search-wrap{position:relative}
    .search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--gray-400)}
    .search-wrap input{padding-left:30px}
    .count-hint{font-size:11px;color:var(--gray-400);padding-bottom:7px}
    .list-area{flex:1;overflow-y:auto;padding:20px 22px 90px}
    .card-list{display:flex;flex-direction:column;gap:10px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
    .tag{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px}
    .tag-brand{background:var(--brand-50);color:var(--brand-700)}
    .tag-blue{background:var(--blue-50);color:var(--blue-600)}
    .tag-green{background:var(--green-50);color:var(--green-600)}
    .tag-gray{background:var(--gray-100);color:var(--gray-600)}
    .tag-red{background:var(--red-50);color:var(--red-600)}
    .tag-amber{background:var(--amber-50);color:var(--amber-600)}
    .tag-purple{background:#faf5ff;color:#9333ea}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;border:1px solid transparent;font-size:12px;font-weight:500;cursor:pointer}
    .btn-primary{background:var(--brand-600);color:#fff}
    .btn-primary:hover{background:var(--brand-700)}
    .btn-outline{background:#fff;border-color:var(--gray-300);color:var(--gray-700)}
    .btn-ghost{background:none;border:none;color:var(--gray-600);padding:5px 8px}
    .btn-sm{padding:5px 9px;font-size:11px}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .bottom-bar{position:fixed;bottom:0;left:var(--sidebar-w);right:0;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);border-top:1px solid var(--gray-200);padding:10px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    .bottom-bar .spacer{flex:1}
    .empty{text-align:center;padding:50px 20px;color:var(--gray-400)}
    .empty h3{font-size:14px;color:var(--gray-600);margin-bottom:6px}
    .row-card{background:#fff;border:1px solid var(--gray-200);border-radius:11px;padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;cursor:pointer}
    .row-card:hover{border-color:var(--brand-600);box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .material-card{background:#fff;border:1px solid var(--gray-200);border-radius:11px;overflow:hidden;cursor:pointer;position:relative}
    .material-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.07)}
    .material-card .preview{display:flex;align-items:center;justify-content:center;aspect-ratio:1}
    .material-card.video .preview{aspect-ratio:9/16;max-height:200px}
    .material-card .body{padding:10px}
    .material-card .name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .material-card .meta{font-size:10px;color:var(--gray-500);margin-top:3px}
    .knowledge-card{background:#fff;border:1px solid var(--gray-200);border-radius:11px;padding:14px;display:flex;gap:10px}
    .knowledge-card h3{font-size:13px;font-weight:500}
    .knowledge-card .kid{font-family:monospace;font-size:10px;color:var(--gray-400)}
    .knowledge-card .summary{font-size:12px;color:var(--gray-600);margin-top:6px;line-height:1.45}
    .kb-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:8px;font-size:11px}
    .kb-field{display:flex;flex-direction:column;gap:2px}
    .kb-field .kb-k{color:var(--gray-400);font-size:10px}
    .kb-field .kb-v{color:var(--gray-700);line-height:1.4}
    .kb-field.full{grid-column:1/-1}
    .sidebar-panel{width:210px;flex-shrink:0;border-right:1px solid var(--gray-200);background:rgba(249,250,251,.85);padding:14px;overflow-y:auto}
    .sidebar-panel-btn{display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;border-radius:7px;font-size:12px;color:var(--gray-600);cursor:pointer;margin-bottom:3px}
    .sidebar-panel-btn.active{background:var(--brand-50);color:var(--brand-700);font-weight:600}
    .content-split{flex:1;display:flex;min-height:0;overflow:hidden}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:14px;max-width:860px;width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--gray-100)}
    .modal-header h2{font-size:15px;font-weight:600}
    .modal-close{border:none;background:none;font-size:22px;color:var(--gray-400);cursor:pointer}
    .modal-body{padding:18px;overflow-y:auto;flex:1;font-size:13px}
    .metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
    .metric-card{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px}
    .metric-card .label{font-size:11px;color:var(--gray-500)}
    .metric-card .value{font-size:22px;font-weight:600;margin-top:4px;color:var(--gray-900)}
    .metric-card .sub{font-size:10px;color:var(--gray-400);margin-top:2px}
    table.data-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200)}
    table.data-table th,table.data-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--gray-100)}
    table.data-table th{background:var(--gray-50);color:var(--gray-500);font-weight:500;font-size:11px}
    table.data-table tr:hover td{background:var(--gray-50)}
    /* 生成页 */
    .create-page{flex:1;display:flex;flex-direction:column;min-height:0}
    .mode-bar{padding:10px 22px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;gap:6px}
    .mode-bar button{padding:7px 16px;border:none;background:var(--gray-100);border-radius:8px;font-size:12px;cursor:pointer;color:var(--gray-600)}
    .mode-bar button.active{background:#fff;color:var(--brand-700);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .stage-bar{padding:8px 22px;background:#fff;border-bottom:1px solid var(--gray-100);display:flex;gap:6px;flex-wrap:wrap}
    .stage-pill{padding:4px 12px;border-radius:999px;font-size:11px;border:1px solid var(--gray-200);color:var(--gray-500);background:#fff}
    .stage-pill.done{background:var(--green-50);border-color:#bbf7d0;color:var(--green-600)}
    .stage-pill.current{background:var(--brand-50);border-color:#c7d2fe;color:var(--brand-700);font-weight:600}
    .create-split{flex:1;display:flex;min-height:0;overflow:hidden}
    .agent-panel{width:42%;min-width:300px;border-right:1px solid var(--gray-200);background:#fff;display:flex;flex-direction:column}
    .agent-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:92%;padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.55}
    .msg-agent{background:var(--gray-100);color:var(--gray-800);align-self:flex-start;border-bottom-left-radius:2px}
    .msg-user{background:var(--brand-600);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
    .agent-input{border-top:1px solid var(--gray-100);padding:12px;display:flex;gap:8px}
    .agent-input input{flex:1;padding:8px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:12px}
    .plan-panel{flex:1;overflow-y:auto;padding:16px 18px;background:#fafafa}
    .form-section{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:14px;margin-bottom:12px}
    .form-section h3{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--gray-100)}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--gray-100)}
    .section-head h3{font-size:13px;font-weight:600;margin:0;padding:0;border:none}
    .shot-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .shot-item-head strong{font-size:12px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
    .form-grid .full{grid-column:1/-1}
    .field{min-width:0}
    .field label{display:block;font-size:11px;color:var(--gray-500);margin-bottom:3px}
    .field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:12px}
    .field textarea{min-height:60px;resize:vertical}
    .field .readonly{background:var(--gray-50);color:var(--gray-600)}
    .multi-select{position:relative}
    .multi-select-trigger{width:100%;padding:7px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:12px;background:#fff;text-align:left;cursor:pointer;color:var(--gray-800)}
    .multi-select-panel{display:none;position:absolute;z-index:20;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--gray-200);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:8px;max-height:220px;overflow:auto}
    .multi-select.open .multi-select-panel{display:block}
    .multi-select-panel label{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;cursor:pointer}
    .multi-select-panel label:hover{background:var(--gray-50)}
    .multi-select-panel input{width:auto}
    .multi-select-panel label.is-disabled{opacity:.45;cursor:not-allowed}
    .style-hint{font-size:11px;color:var(--gray-500);margin-top:8px;line-height:1.5}
    .product-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
    .product-card{border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:11px;background:var(--gray-50)}
    .product-card .title{font-weight:500;margin-bottom:4px}
    .product-card .reason{color:var(--gray-500);font-size:10px;margin-top:4px}
    .create-footer{padding:12px 22px;background:#fff;border-top:1px solid var(--gray-200);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .collapse-toggle{font-size:11px;color:var(--brand-600);cursor:pointer;margin-bottom:8px;display:inline-block}
    .shot-list{margin-top:8px}
    .shot-item{border:1px solid var(--gray-100);border-radius:8px;padding:10px;margin-bottom:8px;font-size:11px;background:var(--gray-50)}
    .replicate-zone{border:2px dashed var(--gray-300);border-radius:10px;padding:24px;text-align:center;color:var(--gray-500);font-size:12px;margin-bottom:12px;background:#fff}
    @media(max-width:900px){.create-split{flex-direction:column}.agent-panel{width:100%;max-height:40vh}.sidebar-panel{display:none}.bottom-bar{left:0}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">AI 广告素材生成平台</div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="modal-overlay" id="modal"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h2 id="modal-title">详情</h2><button class="modal-close" id="modal-close">&times;</button></div><div class="modal-body" id="modal-body"></div></div></div>
<script>
(function(){
"use strict";

const CHANNELS={all:"不限",feed:"信息流",dsp:"DSP",seed:"种草",vendor:"厂商"};
const MEDIAS={all:"不限",feed:{douyin:"抖音",kuaishou:"快手"},dsp:{tencent:"腾讯广告"},seed:{xiaohongshu:"小红书"},vendor:{huawei:"华为"}};
const MATERIAL_STATUS={stored:"已入库待投放",exported:"已导出待投放",delivering:"投放中",excellent:"表现优良",archived:"已下线归档"};
const TASK_TYPE={preview:"预览任务",batch:"批量任务"};
const TASK_PROGRESS={queued:"排队中",generating:"生成中",done:"生成完成",failed:"生成失败",pending_audit:"待审核"};
const AUDIT_STATUS={pending:"待审核",reviewing:"审核中",passed:"通过",rejected:"驳回"};

const IMAGE_KB=[
  {id:"channel",label:"频道库",fields:"频道名称、频道 ID、默认投放渠道、默认适配媒体、默认图片/视频尺寸、核心利益点、默认 CTA"},
  {id:"product",label:"商品库",fields:"商品 ID、商品标题、商品类目、默认价格表达、历史投放标签、适配创意方向、风险提示"},
  {id:"brand",label:"品牌资产库",fields:"品牌名称、品牌 ID、Logo 图、Logo 尺寸、品牌标语、适合展示位、文案风格、禁用表达"},
  {id:"fengti",label:"风格提示词库",fields:"风格提示词名称、ID、内容、适用场景、适配媒体、适配商品类目"},
  {id:"font",label:"字体库",fields:"字体名称、字体 ID、字体包、适用文案类型、绑定品牌 ID、备注"},
  {id:"tag",label:"标签库",fields:"标签名称、标签 ID、文案内容、标签类型、适配投放场景、风险等级"},
];
const VIDEO_KB=[
  ...IMAGE_KB.filter(k=>["channel","product","brand","fengti","tag"].includes(k.id)),
  {id:"avatar",label:"数字人库",fields:"数字人名称、ID、适用场景、绑定音色 ID、语速、最大时长、口播风格"},
  {id:"subtitle",label:"字幕模板库",fields:"模板名称、ID、适用媒体、适配尺寸、字幕渲染、绑定字体、适合位置"},
  {id:"voice",label:"音色库",fields:"音色名称、ID、性别/年龄感、语速、默认音量、适配视频风格、情绪"},
  {id:"bgm",label:"BGM 库",fields:"BGM 名称、ID、节奏、适配视频风格、默认音量占比、循环播放、情绪、版权备注"},
  {id:"transition",label:"转场库",fields:"转场名称、ID、适用镜头类型、适配视频节奏、默认转场时长、备注"},
  {id:"firstframe",label:"首帧库",fields:"首帧名称、ID、适用媒体、适配尺寸、适配 Hook 类型、默认文案位置、适用风格"},
  {id:"lastframe",label:"尾帧库",fields:"尾帧名称、ID、CTA 类型、适配尺寸、默认 CTA 文案、默认展示时长、适用媒体"},
];

const KB_DETAIL_TEMPLATES={
  channel:[{k:"频道 ID",v:""},{k:"默认投放渠道",v:""},{k:"默认适配媒体",v:""},{k:"默认图片尺寸",v:""},{k:"默认视频尺寸",v:""},{k:"默认视频时长",v:""},{k:"频道核心利益点",v:"",full:true},{k:"频道默认 CTA 文案",v:"",full:true}],
  product:[{k:"商品 ID",v:""},{k:"商品类目",v:""},{k:"商品默认价格表达",v:""},{k:"历史投放表现标签",v:"",full:true},{k:"适配创意方向",v:"",full:true},{k:"风险提示",v:"",full:true}],
  brand:[{k:"品牌 ID",v:""},{k:"品牌 Logo 尺寸",v:""},{k:"适合展示位",v:""},{k:"品牌特色标语",v:"",full:true},{k:"默认文案风格",v:""},{k:"品牌禁用表达清单",v:"",full:true}],
  fengti:[{k:"风格提示词 ID",v:""},{k:"适用场景",v:""},{k:"适配媒体",v:""},{k:"适配商品类目",v:"",full:true},{k:"风格提示词内容",v:"",full:true}],
  font:[{k:"字体 ID",v:""},{k:"字体包",v:""},{k:"适用文案类型",v:""},{k:"绑定品牌 ID",v:""},{k:"备注",v:"",full:true}],
  tag:[{k:"标签 ID",v:""},{k:"文案内容",v:""},{k:"标签类型",v:""},{k:"适配投放场景",v:""},{k:"风险等级",v:""}],
  avatar:[{k:"数字人 ID",v:""},{k:"适用场景",v:"",full:true},{k:"绑定音色 ID",v:""},{k:"默认语速参数",v:""},{k:"支持最大时长",v:""},{k:"口播风格",v:"",full:true}],
  subtitle:[{k:"模板 ID",v:""},{k:"适用媒体",v:""},{k:"适配尺寸",v:""},{k:"默认字幕渲染方式",v:""},{k:"绑定字体 ID",v:""},{k:"适合位置",v:""}],
  voice:[{k:"音色 ID",v:""},{k:"性别/年龄感",v:""},{k:"语速参数值",v:""},{k:"默认音量",v:""},{k:"适配视频风格",v:"",full:true},{k:"情绪",v:"",full:true}],
  bgm:[{k:"BGM ID",v:""},{k:"节奏",v:""},{k:"适配视频风格",v:"",full:true},{k:"默认音量占比",v:""},{k:"支持循环播放",v:""},{k:"情绪",v:""},{k:"版权备注",v:"",full:true}],

}

function generateSelectedProducts(count,batch){
  const n=Math.max(1,Math.min(12,Number(count)||5));
  const start=(batch*n)%PRODUCT_POOL.length;
  const list=[];
  for(let i=0;i<n;i++){
    const p=PRODUCT_POOL[(start+i)%PRODUCT_POOL.length];
    list.push({id:`SKU-${2000+batch*10+i+1}`,name:p.name,category:p.category,reason:p.reason});
  }
  return list;
}

function ensureSelectionState(s){
  const count=Number(s.productCount)||5;
  if(!s.selectedProducts||!s.selectedProducts.length){
    s.productBatch=s.productBatch||0;
    s.selectedProducts=generateSelectedProducts(count,s.productBatch);
  }
  if(!s.selectionStrategy)s.selectionStrategy=getDefaultSelectionStrategy(s.selectedProducts.length);
}

function openKnowledgeForm(mode,item){
  state.knowledge.form={mode,item:JSON.parse(JSON.stringify(item))};
  const libs=state.knowledge.partition==="video"?VIDEO_KB:IMAGE_KB;
  const libLabel=libs.find(l=>l.id===item.lib)?.label||item.lib;
  const title=mode==="add"?"新增资产 · "+libLabel:"编辑资产 · "+item.name;
  const f=item;
  const libSelect=mode==="add"&&state.knowledge.subLib==="all"?`<div class="field full"><label>所属子库</label><select id="kb-form-lib">${libs.map(l=>`<option value="${esc(l.id)}"${l.id===f.lib?" selected":""}>${esc(l.label)}</option>`).join("")}</select></div>`:"";
  const body=`<form id="kb-form" class="form-grid" style="gap:12px">

    <div class="field"><label>资产名称</label><input id="kb-f-name" value="${esc(f.name)}"/></div>
    <div class="field"><label>资产 ID</label><input id="kb-f-id" value="${esc(f.id)}" ${mode==="edit"?"readonly class=\"readonly\"":""}/></div>
    <div class="field"><label>创建人</label><input id="kb-f-creator" value="${esc(f.creator)}"/></div>
    <div class="field"><label>创建时间</label><input type="date" id="kb-f-created" value="${esc((f.created||"").slice(0,10))}"/></div>
    <div class="field full"><label>失效时间</label><input id="kb-f-expire" value="${esc(f.expire)}"/></div>
    ${(f.detail||[]).map((d,i)=>`<div class="field${d.full?" full":""}"><label>${esc(d.k)}</label>${d.full?`<textarea id="kb-f-d-${i}" rows="2">${esc(d.v)}</textarea>`:`<input id="kb-f-d-${i}" value="${esc(d.v)}"/>`}</div>`).join("")}
    <div class="field full" style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button type="button" class="btn btn-outline btn-sm" id="kb-form-cancel">取消</button>
      <button type="button" class="btn btn-primary btn-sm" id="kb-form-save">保存</button>
    </div>
  </form>`;
  openModal(title,body);
  const cancel=document.getElementById("kb-form-cancel");
  if(cancel)cancel.onclick=()=>{state.knowledge.form=null;closeModal()};
  const save=document.getElementById("kb-form-save");
  if(save)save.onclick=saveKnowledgeForm;
  const libEl=document.getElementById("kb-form-lib");
  if(libEl)libEl.onchange=()=>{
    const draft=newKnowledgeDraft(libEl.value,state.knowledge.partition);
    draft.creator=f.creator||"";
    openKnowledgeForm("add",draft);
  };
}
function saveKnowledgeForm(){
  const form=state.knowledge.form;if(!form)return;
  const f=form.item;
  const nameEl=document.getElementById("kb-f-name");
  const idEl=document.getElementById("kb-f-id");
  const creatorEl=document.getElementById("kb-f-creator");
  const createdEl=document.getElementById("kb-f-created");
  const expireEl=document.getElementById("kb-f-expire");
  if(!nameEl||!idEl||!nameEl.value.trim()||!idEl.value.trim()){alert("请填写资产名称和资产 ID");return}
  f.name=nameEl.value.trim();
  f.id=idEl.value.trim();
  f.creator=creatorEl?creatorEl.value.trim():"";
  f.created=createdEl?createdEl.value:"";
  f.expire=expireEl?expireEl.value.trim():"2099-12-31 23:59:59";
  (f.detail||[]).forEach((d,i)=>{const el=document.getElementById("kb-f-d-"+i);if(el)d.v=el.value.trim()});
  if(form.mode==="add"){
    if(knowledgeStore.some(k=>k.id===f.id&&k.partition===f.partition)){alert("该分区下资产 ID 已存在");return}
    knowledgeStore.push(f);
  }else{
    const idx=knowledgeStore.findIndex(k=>k.id===f.id&&k.partition===f.partition&&k.lib===f.lib);
    if(idx>=0)knowledgeStore[idx]=f;
  }
  state.knowledge.form=null;
  closeModal();
  render();
}

}
function expireKnowledgeItem(item){
  const k=knowledgeStore.find(x=>x.id===item.id&&x.partition===item.partition&&x.lib===item.lib);
  if(k){k.expire=new Date().toISOString().slice(0,10)+" 00:00:00";render()}
}

function analyzeDemand(text,isVideo){
  const t=text.trim();
  const wantsVideo=/视频|短视频|竖版|分镜|口播|BGM/.test(t);
  const wantsImage=/图片|海报|方图|banner|Banner|外投图/.test(t);
  const matType=wantsVideo&&!wantsImage?"视频":wantsImage&&!wantsVideo?"图片":isVideo?"视频":"图片";
  const countMatch=t.match(/(\d+)\s*个/);
  const count=countMatch?countMatch[1]:null;
  const isShortVideo=/短视频|抖音|快手|竖版/.test(t);
  const isSeed=/种草|小红书/.test(t);
  const isPromo=/优惠|福利|低价|券|促销|省钱/.test(t);
  const isChannel=/频道/.test(t);
  const hasItemId=/item\s*id|商品\s*id|指定商品|SKU/i.test(t);
  const media=isShortVideo?"短视频媒体（系统将自动匹配竖版尺寸）":isSeed?"种草媒体（系统将自动匹配方图/竖版尺寸）":/媒体|渠道/.test(t)?"将根据你的描述进一步匹配":"待确认具体媒体";
  const goal=isPromo?"优惠感心智 + 转化点击":/拉新|新客/.test(t)?"拉新获客":/促活|活跃/.test(t)?"用户促活":"待进一步确认投放目标";
  const audience=isPromo?"价格敏感、优惠偏好人群":/新用户|新客/.test(t)?"新用户人群":"待确认目标人群";
  const benefit=isPromo?"省钱、低价感、福利感":/品质|高端/.test(t)?"品质感、实用价值":"待确认核心利益点";
  const creative=matType==="视频"?(isPromo?"商品展示 + 福利权益讲解":/剧情|种草/.test(t)?"场景种草 + 剧情短片":"待确认视频创意方向"):(isPromo?"商品展示 + 对比分析":/模特|人物/.test(t)?"人物展示 + 场景种草":"待确认图片创意方向");
  const productScope=hasItemId?"运营已指定商品 ID，将召回商品信息":"未指定商品 ID，将进入智能选品";
  const summary=`投放目标：${goal}\n素材类型：${matType}\n投放渠道/媒体：${media}\n承接对象：${isChannel?"频道":"商品"}\n商品范围：${productScope}\n人群意图：${audience}\n核心利益点：${benefit}\n创意方向：${creative}${count?`\n生成规模：提及「${count} 个${matType}」，需确认是总量还是单商品数量`:"\n生成规模：待确认"}\n风险边界：需避免绝对化低价、夸大收益等表达`;
  const questions=[];
  if(count)questions.push(`${questions.length+1}. 「${count} 个${matType}」是任务总量还是每个商品生成数量？`);
  if(!isShortVideo&&!isSeed&&!/媒体|渠道|抖音|快手|小红书/.test(t))questions.push(`${questions.length+1}. 请确认具体投放渠道与媒体`);
  if(questions.length===0)questions.push("1. 以上理解是否准确？如有补充请继续说明");
  return{summary,questions:questions.join("\n"),agentReply:"已根据你的描述完成业务层理解。请核对右侧「理解总结」和「待确认问题」，确认无误后可进入智能选品。"};
}

function renderVideoStyleStrategy(s){
  const count=Math.max(1,Math.min(VIDEO_STYLES.length,Number(s.videoStyleCount)||1));
  s.videoStyleCount=count;
  if(!Array.isArray(s.videoStyles))s.videoStyles=["商品展示"];
  if(s.videoStyles.length>count)s.videoStyles=s.videoStyles.slice(0,count);
  if(s.videoStyles.length===0)s.videoStyles=[VIDEO_STYLES[0]];
  const countOpts=Array.from({length:Math.min(5,VIDEO_STYLES.length)},(_,i)=>i+1).map(n=>`<option value="${n}"${n===count?" selected":""}>${n} 个</option>`).join("");
  let styleField="";
  if(count===1){
    const cur=s.videoStyles[0]||VIDEO_STYLES[0];
    if(!s.videoStyles.includes(cur))s.videoStyles=[cur];
    styleField=`<div class="field"><label>视频风格</label><select id="video-style-single">${VIDEO_STYLES.map(o=>`<option${o===cur?" selected":""}>${esc(o)}</option>`).join("")}</select></div>`;

          const checked=s.videoStyles.includes(st);

        }).join("")}</div>

    extra=`<p class="style-hint">当前选择 1 个风格「${esc(s.videoStyles[0]||VIDEO_STYLES[0])}」。Agent 会根据商品特点在后台为每个商品分配风格（单商品最多绑定 1 个）。</p>`;

  return`<div class="form-section"><h3>视频风格策略</h3>
    <div class="form-grid">
      <div class="field"><label>视频风格数量</label><select id="video-style-count">${countOpts}</select></div>

function bindCreate(type){
  const s=state[type];
  document.querySelectorAll(`[data-mode="${type}"]`).forEach(b=>b.onclick=()=>{s.mode=b.dataset.val;resetCreateFlow(s,type);render()});
  document.querySelectorAll(`[data-confirm-stage="${type}"]`).forEach(b=>b.onclick=()=>{
    const i=STAGES.indexOf(s.stage);
    if(i<STAGES.length-1){
      s.stage=STAGES[i+1];
      if(s.stage==="selection"){s.productBatch=0;s.selectedProducts=null;s.selectionStrategy=null;ensureSelectionState(s);}
      if(type==="video"&&s.stage==="creative"&&!s.shots)s.shots=getDefaultShots();
      s.messages.push({role:"agent",text:`已进入【${STAGE_LABELS[s.stage]}】阶段，请在右侧核对字段。`});
      render();
    }
  });
  const send=document.getElementById(type+"-send");
  const input=document.getElementById(type+"-input");
  const productSelectMode=document.getElementById(type+"-product-select-mode");
  if(productSelectMode)productSelectMode.onchange=()=>{s.productSelectMode=productSelectMode.value;render();};
  const categoryInput=document.getElementById(type+"-category-input");
  if(categoryInput)categoryInput.oninput=()=>{s.categoryValue=categoryInput.value;};
  const productIdInput=document.getElementById(type+"-product-id-input");
  if(productIdInput)productIdInput.oninput=()=>{s.productIdValue=productIdInput.value;};
  const productCountInput=document.getElementById(type+"-product-count");
  if(productCountInput)productCountInput.oninput=()=>{s.productCount=productCountInput.value;};
  const strategyInput=document.getElementById(type+"-selection-strategy");
  if(strategyInput)strategyInput.oninput=()=>{s.selectionStrategy=strategyInput.value;};
  const agentSelect=document.getElementById(type+"-agent-select");
  if(agentSelect)agentSelect.onclick=()=>{
    if(strategyInput)s.selectionStrategy=strategyInput.value;
    if(productCountInput)s.productCount=productCountInput.value;
    s.productBatch=(s.productBatch||0)+1;
    s.selectedProducts=generateSelectedProducts(s.productCount,s.productBatch);
    const count=s.selectedProducts.length;
    if(s.selectionStrategy&&/共计\s*\d+\s*个商品/.test(s.selectionStrategy)){
      s.selectionStrategy=s.selectionStrategy.replace(/共计\s*\d+\s*个商品/,"共计 "+count+" 个商品");
    }else{
      s.selectionStrategy=getDefaultSelectionStrategy(count);
    }
    s.messages.push({role:"agent",text:`已按当前选品策略重新完成智能选品，共 ${count} 个商品，请查看右侧商品卡片。`});
    render();
  };
  document.querySelectorAll("[data-del-product]").forEach(btn=>{
    btn.onclick=()=>{
      const id=btn.dataset.delProduct;
      s.selectedProducts=(s.selectedProducts||[]).filter(p=>p.id!==id);
      if(s.selectionStrategy)s.selectionStrategy=s.selectionStrategy.replace(/共计\s*\d+\s*个商品/,"共计 "+s.selectedProducts.length+" 个商品");
      render();
    };
  });
  const manageList=document.getElementById(type+"-manage-list");
  if(manageList)manageList.onclick=()=>{
    ensureSelectionState(s);
    openModal("管理商品 List",`<p style="font-size:12px;color:var(--gray-500);margin-bottom:10px">查看本次任务全部商品，支持删除、搜索召回、添加商品、导出 Excel</p>
    <table class="data-table"><thead><tr><th>商品 ID</th><th>标题</th><th>类目</th><th>推荐原因</th><th>操作</th></tr></thead>
    <tbody>${(s.selectedProducts||[]).map(p=>`<tr><td>${esc(p.id)}</td><td>${esc(p.name)}</td><td>${esc(p.category)}</td><td>${esc(p.reason)}</td><td><button class="btn btn-ghost btn-sm">删除</button></td></tr>`).join("")}</tbody></table>
    <div style="margin-top:12px;display:flex;gap:8px"><input placeholder="按商品标题搜索召回…" style="flex:1;padding:7px 10px;border:1px solid var(--gray-300);border-radius:6px"/><button class="btn btn-outline btn-sm">添加商品</button><button class="btn btn-outline btn-sm">下载 Excel</button></div>`);
  };
  if(send&&input){
    const doSend=()=>{
      const t=input.value.trim();if(!t)return;
      s.messages.push({role:"user",text:t});
      if(s.stage==="demand"){
        s.demandSummary=analyzeDemand(t,type==="video");
        s.demandAnalyzed=true;
        s.messages.push({role:"agent",text:s.demandSummary.agentReply});
      }else{
        s.messages.push({role:"agent",text:"已收到补充说明，请继续核对右侧字段。"});
      }
      input.value="";render();
    };
    send.onclick=doSend;
    input.onkeydown=e=>{if(e.key==="Enter")doSend()};
  }
  if(type==="video"){
    const styleCountEl=document.getElementById("video-style-count");
    if(styleCountEl)styleCountEl.onchange=()=>{
      const next=Math.max(1,Number(styleCountEl.value)||1);
      s.videoStyleCount=next;
      s.videoStyleMultiOpen=false;
      s.videoStyleConfirmed=false;
      if(next===1){
        s.videoStyles=[(s.videoStyles&&s.videoStyles[0])||VIDEO_STYLES[0]];
      }else{
        s.videoStyles=(s.videoStyles||[]).slice(0,next);
      }
      render();
    };
    const styleSingle=document.getElementById("video-style-single");
    if(styleSingle)styleSingle.onchange=()=>{s.videoStyles=[styleSingle.value];s.videoStyleConfirmed=false;};
    const multi=document.getElementById("video-style-multi");
    const trigger=document.getElementById("video-style-trigger");
    if(trigger&&multi){
      trigger.onclick=e=>{
        e.stopPropagation();
        s.videoStyleMultiOpen=!s.videoStyleMultiOpen;
        render();
      };
      document.querySelectorAll("[data-video-style]").forEach(cb=>{
        cb.onchange=()=>{
          const name=cb.dataset.videoStyle;
          let list=[...(s.videoStyles||[])];
          if(cb.checked){
            if(!list.includes(name)&&list.length<s.videoStyleCount)list.push(name);
          }else{
            list=list.filter(x=>x!==name);
          }
          s.videoStyles=list;
          s.videoStyleConfirmed=false;
          s.videoStyleMultiOpen=true;
          render();
        };
      });
      if(s.videoStyleMultiOpen){
        setTimeout(()=>{
          const onDocClick=e=>{
            const panel=document.getElementById("video-style-multi");
            if(panel&&!panel.contains(e.target)){
              s.videoStyleMultiOpen=false;
              document.removeEventListener("click",onDocClick,true);
              render();
            }
          };
          document.addEventListener("click",onDocClick,true);
        },0);
      }
    }
    const confirmStyles=document.getElementById("video-confirm-styles");
    if(confirmStyles)confirmStyles.onclick=()=>{
      if(!s.videoStyles||s.videoStyles.length<2){
        s.messages.push({role:"agent",text:"请先下拉多选至少 2 个视频风格，再点击确认风格。"});
        render();
        return;
      }
      if(s.videoStyles.length!==s.videoStyleCount){
        s.messages.push({role:"agent",text:`当前需选择 ${s.videoStyleCount} 个风格，已选 ${s.videoStyles.length} 个，请补齐后再确认。`});
        render();
        return;
      }
      s.videoStyleConfirmed=true;
      s.videoStyleMultiOpen=false;
      s.messages.push({role:"agent",text:`已确认 ${s.videoStyles.length} 个视频风格（${s.videoStyles.join("、")}）。Agent 已根据商品特点在后台为每个商品分配 1 个风格。`});
      render();
    };
    document.querySelectorAll("[data-shot-idx]").forEach(el=>{
      const idx=+el.dataset.shotIdx;
      const key=el.dataset.shotKey;
      const update=()=>{if(s.shots&&s.shots[idx])s.shots[idx][key]=el.value;};
      el.oninput=update;
      el.onchange=update;
    });
    const addShot=document.getElementById(type+"-add-shot");
    if(addShot)addShot.onclick=()=>{
      if(!s.shots)s.shots=getDefaultShots();
      s.shots.push({duration:"",goal:"Hook",visual:"",subtitle:"",voiceover:""});
      s.shotsCollapsed=false;
      render();
    };
    document.querySelectorAll("[data-shot-del]").forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const i=+btn.dataset.shotDel;
        if(s.shots&&s.shots.length>1){s.shots.splice(i,1);render();}
      };
    });
    const toggle=document.getElementById(type+"-shots-toggle");
    if(toggle)toggle.onclick=()=>{s.shotsCollapsed=!s.shotsCollapsed;render();};
  }
}

    const dc=document.getElementById("d-ch");if(dc)dc.onchange=e=>{state.data.channel=e.target.value;render()};
    const dm=document.getElementById("d-media");if(dm)dm.onchange=e=>{state.data.media=e.target.value;render()};
    const dd=document.getElementById("d-date");if(dd)dd.onchange=e=>{state.data.date=e.target.value;render()};
  }
}

function render(){
  renderNav();
  const main=document.getElementById("main");
  let html="";
  if(state.page==="image-create")html=`<header class="page-header"><div class="page-header-top"><h1>图片素材生成</h1></div></header>`+renderCreate("image");
  else if(state.page==="video-create")html=`<header class="page-header"><div class="page-header-top"><h1>视频素材生成</h1></div></header>`+renderCreate("video");
  else if(state.page==="task-progress")html=renderTasks();
  else if(state.page==="audit")html=renderAudit();
  else if(state.page==="materials")html=renderMaterials();
  else if(state.page==="knowledge")html=renderKnowledge();
  else if(state.page==="material-data")html=renderMaterialData();
  else if(state.page==="account")html=renderAccount();
  main.innerHTML=html;
  bindPageEvents();
}

render();
})();
</script>
</body>
</html>
